        html, body {
            height: 100dvh;
            max-height: 100dvh;
            overflow: hidden;
            font-family: 'Mali', cursive, sans-serif;
            background-color: #0b0f19;

        /* เอฟเฟกต์แอนิเมชันขยับดุ๊กดิ๊กเวลาเด็กเลือกตอบ */
        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        .animate-wiggle {
            animation: wiggle 0.8s ease-in-out infinite;
        }

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 2s ease-in-out infinite;
        }

        /* เอฟเฟกต์ประกายไฟเมื่อตอบถูก */
        .pulse-sky {
            box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.9);
            animation: pulse-sky-anim 1s infinite;
        }
        @keyframes pulse-sky-anim {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.9); transform: scale(1.04); }
            70% { box-shadow: 0 0 0 30px rgba(56, 189, 248, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); transform: scale(1.04); }
        }

        .pulse-orange {
            box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.9);
            animation: pulse-orange-anim 1s infinite;
        }
        @keyframes pulse-orange-anim {
            0% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.9); transform: scale(1.04); }

        .broken-img {

    </style>
</head>

    <script>
        // ระบบสร้างและสังเคราะห์คลื่นเสียง (Web Audio API)
        const soundEngine = {
            ctx: null,

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },

            playCorrect() {
                this.init();
                const now = this.ctx.currentTime;
                
                const osc1 = this.ctx.createOscillator();
                const gain1 = this.ctx.createGain();
                osc1.type = 'triangle';
                osc1.frequency.setValueAtTime(523.25, now);
                gain1.gain.setValueAtTime(0.12, now);
                gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc1.connect(gain1);
                gain1.connect(this.ctx.destination);
                osc1.start(now);
                osc1.stop(now + 0.3);

                const osc2 = this.ctx.createOscillator();
                const gain2 = this.ctx.createGain();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(659.25, now + 0.08);
                gain2.gain.setValueAtTime(0.12, now + 0.08);
                gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc2.connect(gain2);
                gain2.connect(this.ctx.destination);
                osc2.start(now + 0.08);
                osc2.stop(now + 0.35);
            },

            playIncorrect() {
                this.init();
                const now = this.ctx.currentTime;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(150, now + 0.35);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.35);
            },

            playFanfare() {
                this.init();
                const now = this.ctx.currentTime;
                const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, index) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + index * 0.1);
                    gain.gain.setValueAtTime(0.1, now + index * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.1 + 0.5);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + index * 0.1);
                    osc.stop(now + index * 0.1 + 0.5);
                });
            }
        };

        // คลังโจทย์คำถามทั้ง 25 ข้อ
        const questionsBank = [
            // --- หมวดของใช้ส่วนตัว (personal) ---
            { id: 1, text: "แปรงสีฟัน", img: "images/item1.png", answer: "personal" },
            { id: 2, text: "ผ้าเช็ดหน้า", img: "images/item2.png", answer: "personal" },
            { id: 3, text: "แก้วน้ำดื่ม", img: "images/item3.png", answer: "personal" },
            { id: 4, text: "ช้อนส้อม", img: "images/item4.png", answer: "personal" },
            { id: 5, text: "ผ้าห่มนอน", img: "images/item5.png", answer: "personal" },
            { id: 6, text: "หน้ากากอนามัย", img: "images/item6.png", answer: "personal" },
            { id: 7, text: "หมอนหนุน", img: "images/item7.png", answer: "personal" },
            { id: 8, text: "หวีสางผม", img: "images/item8.png", answer: "personal" },
            { id: 9, text: "รองเท้าพละ", img: "images/item9.png", answer: "personal" },
            { id: 10, text: "ผ้าเช็ดตัว", img: "images/item10.png", answer: "personal" },
            { id: 11, text: "กล่องดินสอ", img: "images/item11.png", answer: "personal" },
            { id: 12, text: "กระติกน้ำร้อน", img: "images/item12.png", answer: "personal" },
            
            // --- หมวดของใช้ส่วนรวม (shared) ---
            { id: 13, text: "ของเล่นในห้องเรียน", img: "images/item13.png", answer: "shared" },
            { id: 14, text: "ไม้กวาดและที่ตักผง", img: "images/item14.png", answer: "shared" },
            { id: 15, text: "หนังสือนิทานในมุมหนังสือ", img: "images/item15.png", answer: "shared" },
            { id: 16, text: "ถังขยะ", img: "images/item16.png", answer: "shared" },
            { id: 17, text: "ทีวีในห้องเรียน", img: "images/item17.png", answer: "shared" },
            { id: 18, text: "นาฬิกาฝาผนัง", img: "images/item18.png", answer: "shared" },
            { id: 19, text: "โต๊ะและเก้าอี้เรียน", img: "images/item19.png", answer: "shared" },
            { id: 20, text: "พัดลม/แอร์", img: "images/item20.png", answer: "shared" },
            { id: 21, text: "กระดานไวท์บอร์ด", img: "images/item21.png", answer: "shared" },
            { id: 22, text: "สีเทียน/สีไม้ประจำกลุ่ม", img: "images/item22.png", answer: "shared" },
            { id: 23, text: "อ่างล้างมือ", img: "images/item23.png", answer: "shared" },
            { id: 24, text: "กรรไกรตัดกระดาษของห้อง", img: "images/item24.png", answer: "shared" },
            { id: 25, text: "ร่มคันใหญ่ของห้องเรียน", img: "images/item25.png", answer: "shared" }
        ];

        let currentGameState = 'loading';
        let activeQuestions = [];
        let currentQuestionIdx = 0;
        let score = 0;
        let selectionHoldTarget = null;
        let selectionHoldTime = 0;

        let tiltCalibrationBaseline = 0;
        let liveTiltAngle = 0;
        let trackingActive = false;
        let webcamStream = null;
        let sensitivityThreshold = 14.5;
        let invertTiltDirection = false;

        const UI = {
            screenCalibrate: document.getElementById('screen-calibrate'),
            screenGameplay: document.getElementById('screen-gameplay'),
            screenComplete: document.getElementById('screen-complete'),
            headerQuestionPill: document.getElementById('header-question-pill'),
            btnStartGame: document.getElementById('btn-start-game'),
            btnKeyboardFallback: document.getElementById('btn-keyboard-fallback'),
            btnReplay: document.getElementById('btn-replay'),
            btnToggleMirror: document.getElementById('btn-toggle-mirror'),
            scoreVal: document.getElementById('score-val'),
            
            sensitivitySlider: document.getElementById('sensitivity-slider'),
            sensVal: document.getElementById('sens-val'),
            tiltLiveDebug: document.getElementById('tilt-live-debug'),
            testSliderIndicator: document.getElementById('test-slider-indicator'),
            testIndicatorLeft: document.getElementById('test-indicator-left'),
            testIndicatorMid: document.getElementById('test-indicator-mid'),
            testIndicatorRight: document.getElementById('test-indicator-right'),

            notificationBanner: document.getElementById('notification-banner'),
            notificationText: document.getElementById('notification-text'),

            currentQuestionNum: document.getElementById('current-question-num'),
            questionText: document.getElementById('question-text'),
            questionImg: document.getElementById('question-img'),
            questionPlaceholder: document.getElementById('question-placeholder'),
            optionLeftCard: document.getElementById('option-left-card'),
            optionRightCard: document.getElementById('option-right-card'),
            lockProgressLeft: document.getElementById('lock-progress-left'),
            lockProgressRight: document.getElementById('lock-progress-right'),
            gameplayTiltIndicator: document.getElementById('gameplay-tilt-indicator'),

            feedbackOverlay: document.getElementById('feedback-overlay'),
            feedbackCard: document.getElementById('feedback-card'),
            feedbackIconBox: document.getElementById('feedback-icon-box'),
            feedbackTitle: document.getElementById('feedback-title'),
            feedbackSubtitle: document.getElementById('feedback-subtitle'),

            starsRow: document.getElementById('stars-row'),
            finalScore: document.getElementById('final-score'),
            achievementLabel: document.getElementById('achievement-label'),
            
            video: document.getElementById('webcam'),
            canvas: document.getElementById('face-canvas'),
            canvasCtx: document.getElementById('face-canvas').getContext('2d'),
        };

        window.onload = async () => {
            await initCameraAndTracking();
        };

        async function initCameraAndTracking() {
            try {
                webcamStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: "user" }
                });
                
                UI.video.srcObject = webcamStream;

                const faceMesh = new FaceMesh({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
                });

                faceMesh.setOptions({
                    maxNumFaces: 1,
                    refineLandmarks: true,
                    minDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.6
                });

                faceMesh.onResults(onFaceTrackingResults);

                const cameraLoop = async () => {
                    if (trackingActive) {
                        try {
                            await faceMesh.send({ image: UI.video });
                        } catch (err) {
                            console.error("การส่งเฟรมมีปัญหา:", err);
                        }
                    }
                    requestAnimationFrame(cameraLoop);
                };

                trackingActive = true;
                cameraLoop();
                changeState('calibrate');

            } catch (err) {
                console.warn("ไม่สามารถเรียกกล้องได้ สลับไปโหมดทดแทนแป้นพิมพ์", err);
                enableKeyboardFallbackOnly();
                changeState('calibrate');
            }
        }

        function onFaceTrackingResults(results) {
            UI.canvas.width = UI.video.clientWidth;
            UI.canvas.height = UI.video.clientHeight;
            UI.canvasCtx.clearRect(0, 0, UI.canvas.width, UI.canvas.height);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                const leftEye = landmarks[33];
                const rightEye = landmarks[263];

                const dy = (rightEye.y - leftEye.y) * UI.canvas.height;
                const dx = (rightEye.x - leftEye.x) * UI.canvas.width;

                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                let rawTilt = angle - tiltCalibrationBaseline;
                
                liveTiltAngle = invertTiltDirection ? -rawTilt : rawTilt;

                drawCuteFaceGuides(landmarks);
                handleTiltInput(liveTiltAngle);
            } else {
                handleTiltInput(0);
            }
        }

        // วาดจุดเอฟเฟกต์นำสายตาน่ารักๆ บนใบหน้า
        function drawCuteFaceGuides(landmarks) {
            const ctx = UI.canvasCtx;
            const w = UI.canvas.width;
            const h = UI.canvas.height;

            ctx.fillStyle = "rgba(16, 185, 129, 0.75)";
            
            const drawEyeBubble = (p) => {
                ctx.beginPath();
                ctx.arc(p.x * w, p.y * h, 5, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = "#FFF";
                ctx.lineWidth = 1.5;
                ctx.stroke();
            };
            
            drawEyeBubble(landmarks[33]);
            drawEyeBubble(landmarks[263]);

            const drawCheekBlush = (p) => {
                ctx.fillStyle = "rgba(244, 63, 94, 0.4)";
                ctx.beginPath();
                ctx.arc(p.x * w, p.y * h, 14, 0, 2 * Math.PI);
                ctx.fill();
            };
            drawCheekBlush(landmarks[50]);
            drawCheekBlush(landmarks[280]);
        }

        // ประมวลผลเมื่อหัวเอียงซ้ายหรือขวา
        function handleTiltInput(angle) {
            const dirText = angle > 4 ? `ขวา` : angle < -4 ? `ซ้าย` : `ตรง`;
            if (currentGameState === 'calibrate') {
                UI.tiltLiveDebug.innerHTML = `เอียง: ${angle.toFixed(1)}° (${dirText})`;
                
                const mappedPercent = Math.min(Math.max(angle, -25), 25);
                const slideLeft = 50 + (mappedPercent / 25) * 50;
                UI.testSliderIndicator.style.left = `${slideLeft}%`;

                if (angle < -sensitivityThreshold) {
                    UI.testIndicatorLeft.className = "text-sky-600 font-black scale-105 transition-transform duration-100";
                    UI.testIndicatorRight.className = "text-orange-400 font-bold scale-100";
                } else if (angle > sensitivityThreshold) {
                    UI.testIndicatorRight.className = "text-orange-600 font-black scale-105 transition-transform duration-100";
                    UI.testIndicatorLeft.className = "text-sky-400 font-bold scale-100";
                } else {
                    UI.testIndicatorLeft.className = "text-sky-500 font-bold scale-100";
                    UI.testIndicatorRight.className = "text-orange-500 font-bold scale-100";
                }
            }

            if (currentGameState === 'playing') {
                UI.gameplayTiltIndicator.innerHTML = `องศาใบหน้า: ${angle.toFixed(1)}° (${dirText})`;

                let currentInput = null;
                if (angle < -sensitivityThreshold) {
                    currentInput = 'personal';
                } else if (angle > sensitivityThreshold) {
                    currentInput = 'shared';
                }

                evaluateSelectionHold(currentInput);
            }
        }

        // ระบบจับความก้าวหน้าของการเอียงคอค้าง 0.8 วินาที
        let lastTimestamp = performance.now();
        function evaluateSelectionHold(input) {
            const now = performance.now();
            const dt = now - lastTimestamp;
            lastTimestamp = now;

            if (input === null) {
                selectionHoldTarget = null;
                selectionHoldTime = 0;
                resetOptionCardAnimations();
                return;
            }

            if (selectionHoldTarget !== input) {
                selectionHoldTarget = input;
                selectionHoldTime = 0;
                resetOptionCardAnimations();
                
                if (input === 'personal') {
                    UI.optionLeftCard.classList.add('pulse-sky');
                } else {
                    UI.optionRightCard.classList.add('pulse-orange');
                }
            } else {
                selectionHoldTime += dt;
                const progressPercent = Math.min(100, Math.floor((selectionHoldTime / 800) * 100));

                if (input === 'personal') {
                    UI.lockProgressLeft.style.transform = "scale(1)";
                    UI.lockProgressLeft.innerHTML = `${progressPercent}%`;
                } else {
                    UI.lockProgressRight.style.transform = "scale(1)";
                    UI.lockProgressRight.innerHTML = `${progressPercent}%`;
                }

                if (selectionHoldTime >= 800) {
                    const selected = selectionHoldTarget;
                    selectionHoldTarget = null;
                    selectionHoldTime = 0;
                    resetOptionCardAnimations();
                    checkAnswer(selected);
                }
            }
        }

        function resetOptionCardAnimations() {
            UI.optionLeftCard.classList.remove('pulse-sky');
            UI.optionRightCard.classList.remove('pulse-orange');
            UI.lockProgressLeft.style.transform = "scale(0)";
            UI.lockProgressRight.style.transform = "scale(0)";
        }

        function changeState(newState) {
            currentGameState = newState;
            
            UI.screenCalibrate.classList.add('hidden');
            UI.screenGameplay.classList.add('hidden');
            UI.screenComplete.classList.add('hidden');

            if (newState === 'calibrate') {
                UI.screenCalibrate.classList.remove('hidden');
                UI.headerQuestionPill.classList.add('hidden');
                UI.headerQuestionPill.classList.remove('flex');
                setTimeout(() => {
                    tiltCalibrationBaseline = liveTiltAngle;
                }, 800);
            } else if (newState === 'playing') {
                UI.screenGameplay.classList.remove('hidden');
                UI.headerQuestionPill.classList.remove('hidden');
                UI.headerQuestionPill.classList.add('flex');
                startGameCycle();
            } else if (newState === 'complete') {
                UI.screenComplete.classList.remove('hidden');
                UI.headerQuestionPill.classList.add('hidden');
                UI.headerQuestionPill.classList.remove('flex');
                displayGameResults();
            }
        }

        function startGameCycle() {
            currentQuestionIdx = 0;
            score = 0;
            UI.scoreVal.innerHTML = score;
            activeQuestions = shuffleArray([...questionsBank]);
            loadQuestion(currentQuestionIdx);
        }

        function loadQuestion(index) {
            if (index >= activeQuestions.length) {
                changeState('complete');
                return;
            }

            const q = activeQuestions[index];
            UI.currentQuestionNum.innerHTML = index + 1;
            UI.questionText.innerHTML = q.text;

            UI.questionImg.classList.remove('broken-img');
            UI.questionImg.classList.add('hidden');
            UI.questionPlaceholder.classList.remove('hidden');
            
            UI.questionImg.onload = function() {
                UI.questionImg.classList.remove('hidden');
                UI.questionPlaceholder.classList.add('hidden');
            };

            UI.questionImg.onerror = function() {
                UI.questionImg.classList.add('broken-img');
                UI.questionPlaceholder.classList.remove('hidden');
            };

            UI.questionImg.src = q.img;
        }

        function checkAnswer(selection) {
            if (currentGameState !== 'playing') return;
            currentGameState = 'feedback';

            const q = activeQuestions[currentQuestionIdx];
            const isCorrect = (selection === q.answer);

            if (isCorrect) {
                score++;
                UI.scoreVal.innerHTML = score;
                showFeedbackOverlay(true);
            } else {
                showFeedbackOverlay(false);
            }

            setTimeout(() => {
                hideFeedbackOverlay();
                currentQuestionIdx++;
                currentGameState = 'playing';
                loadQuestion(currentQuestionIdx);
            }, 2300);
        }

        function showFeedbackOverlay(isCorrect) {
            UI.feedbackOverlay.classList.remove('hidden');
            UI.feedbackCard.className = "bg-white p-7 rounded-[35px] border-8 shadow-2xl max-w-xs w-full flex flex-col items-center space-y-3 transform scale-95 transition-transform duration-200";
            
            if (isCorrect) {
                UI.feedbackCard.classList.add('border-emerald-400');
                UI.feedbackIconBox.innerHTML = "🎉";
                UI.feedbackIconBox.className = "w-16 h-16 rounded-full bg-emerald-100 flex items-center justify-center text-4xl shadow-inner animate-bounce text-emerald-600";
                UI.feedbackTitle.innerHTML = "ถูกต้องนะคนเก่ง!";
                UI.feedbackTitle.className = "text-xl md:text-2xl font-black text-emerald-600";
                UI.feedbackSubtitle.innerHTML = "ยอดเยี่ยมที่สุดเลยครับ!";
                UI.feedbackSubtitle.className = "text-xs text-emerald-800 font-bold";
                soundEngine.playCorrect();
            } else {
                UI.feedbackCard.classList.add('border-rose-400');
                UI.feedbackIconBox.innerHTML = "❤️";
                UI.feedbackIconBox.className = "w-16 h-16 rounded-full bg-rose-100 flex items-center justify-center text-4xl shadow-inner animate-pulse text-rose-500";
                UI.feedbackTitle.innerHTML = "ลองดูอีกครั้งนะครับ";
                UI.feedbackTitle.className = "text-xl md:text-2xl font-black text-rose-600";
                UI.feedbackSubtitle.innerHTML = "ตั้งใจดูอีกรอบนะคนเก่ง!";
                UI.feedbackSubtitle.className = "text-xs text-rose-800 font-bold";
                soundEngine.playIncorrect();
            }

            setTimeout(() => {
                UI.feedbackCard.classList.remove('scale-95');
                UI.feedbackCard.classList.add('scale-100');
            }, 50);
        }

        function hideFeedbackOverlay() {
            UI.feedbackOverlay.classList.add('hidden');
        }

        function showNotification(text) {
            UI.notificationText.innerText = text;
            UI.notificationBanner.classList.remove('hidden');
            setTimeout(() => {
                UI.notificationBanner.classList.add('hidden');
            }, 3000);
        }

        // คำนวณสรุปผลดาวเมื่อสิ้นสุดเกม
        function displayGameResults() {
            UI.finalScore.innerHTML = score;
            soundEngine.playFanfare();
            UI.starsRow.innerHTML = '';
            
            let starCount = 1;
            if (score >= 22) starCount = 5;
            else if (score >= 18) starCount = 4;
            else if (score >= 13) starCount = 3;
            else if (score >= 8) starCount = 2;

            for (let i = 0; i < 5; i++) {
                const star = document.createElement('i');
                if (i < starCount) {
                    star.className = "fa-solid fa-star text-yellow-400 drop-shadow-md transform scale-110 transition-all duration-300";
                } else {
                    star.className = "fa-regular fa-star text-slate-300 drop-shadow-sm";
                }
                UI.starsRow.appendChild(star);
            }

            if (starCount === 5) {
                UI.achievementLabel.innerHTML = "👑 ยอดคุณหนูนักคิดวิเคราะห์";
            } else if (starCount >= 3) {
                UI.achievementLabel.innerHTML = "🏆 คนเก่งประจำห้องเรียน";
            } else {
                UI.achievementLabel.innerHTML = "✨ ยินดีกับความตั้งใจจ้า";
            }
        }

        UI.sensitivitySlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            UI.sensVal.innerHTML = `${val}/10`;
            sensitivityThreshold = 22 - (val * 1.5); 
        });

        UI.btnToggleMirror.addEventListener('click', () => {
            invertTiltDirection = !invertTiltDirection;
            
            if (invertTiltDirection) {
                UI.btnToggleMirror.className = "bg-rose-500 hover:bg-rose-600 active:scale-95 text-white font-black text-xs py-2 px-3 rounded-xl border-b-4 border-rose-700 shadow-md transition-all flex items-center justify-center space-x-1";
                showNotification("สลับการเอียงด้านเรียบร้อย! 🔁");
            } else {
                UI.btnToggleMirror.className = "bg-blue-400 hover:bg-blue-500 active:scale-95 text-white font-black text-xs py-2 px-3 rounded-xl border-b-4 border-blue-600 shadow-md transition-all flex items-center justify-center space-x-1";
                showNotification("กลับมาใช้พิกัดกล้องมาตรฐานแล้วจ้า!");
            }
            tiltCalibrationBaseline = liveTiltAngle;
        });

        UI.btnStartGame.addEventListener('click', () => {
            soundEngine.init();
            changeState('playing');
        });

        UI.btnReplay.addEventListener('click', () => {
            changeState('playing');
        });

        UI.btnKeyboardFallback.addEventListener('click', () => {
            enableKeyboardFallbackOnly();
            changeState('playing');
        });

        function enableKeyboardFallbackOnly() {
            trackingActive = false;
            if (webcamStream) {
                webcamStream.getTracks().forEach(track => track.stop());
            }
            showNotification("ใช้คีย์บอร์ด ปุ่ม ◄ และ ► เล่นได้เลยจ้า!");
        }

        // ระบบสำรองคีย์บอร์ดให้คุณครูช่วยแก้โจทย์
        window.addEventListener('keydown', (e) => {
            if (currentGameState === 'playing') {
                if (e.key === 'ArrowLeft') {
                    checkAnswer('personal');
                } else if (e.key === 'ArrowRight') {
                    checkAnswer('shared');
                }
            }
        });

        UI.optionLeftCard.addEventListener('click', () => {
            if (currentGameState === 'playing') checkAnswer('personal');
        });
        UI.optionRightCard.addEventListener('click', () => {
            if (currentGameState === 'playing') checkAnswer('shared');
        });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    </script>
